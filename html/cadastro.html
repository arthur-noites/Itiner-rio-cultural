<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se - Mapa Cultural</title>
    
  <link rel="stylesheet" href="css/login.css"">

</head>
<body>

    <div class="auth-card">
        <a href="base.html" class="close-btn">✕</a>
        
        <h2>Crie sua conta</h2>
        <p class="subtitle">Junte-se à nossa comunidade para mapear e apoiar a cultura da nossa região.</p>

        <form id="formCadastro">
            <div class="input-group">
                <input type="text" name="nome" placeholder="Nome completo" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            
            <div class="input-group">
                <input type="password" name="senha" placeholder="Criar senha" required>
            </div>

            <div class="input-group">
                <input type="password" name="confirmarSenha" placeholder="Confirmar senha" required>
            </div>

            <button type="submit" class="btn-primary">Cadastrar</button>
        </form>

        <div class="divider">
            <span>Ou registre-se com</span>
        </div>

        <p class="footer-link">
            Já tem uma conta? <a href="login.html">Inicie sessão aqui</a>.
        </p>
    </div>

<script src="../js/cadastro.js"></script>   
</body>

</html>
