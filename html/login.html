<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sessão - Mapa  Cultural</title>
    
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

    <div class="auth-card">
        <a href="base.html" class="close-btn">✕</a>
        
        <h2>Inicie sessão</h2>
        <p class="subtitle">Acesse sua conta para favoritar pontos culturais e se conectar com os artistas da região</p>

        <form id="formLogin">
            <div class="input-group">
                <input name="email" type="email" placeholder="Email" required>
            </div>
            
            <div class="input-group">
                <input name="senha" type="password" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-primary">Continuar</button>
        </form>

        <div class="divider">
            <span>Ou inicie sessão com</span>
        </div>

        <p class="footer-link">
            Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>.
        </p>
    </div>

    <script src="../JS/login.js"></script>

</body>
</html>
